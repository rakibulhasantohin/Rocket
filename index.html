<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>রকেট - ডাচ-বাংলা ব্যাংক মোবাইল ব্যাংকিং (Rocket Offline)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Rocket Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('Rocket Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
